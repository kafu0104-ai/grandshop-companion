<!doctype html><html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GRAND SHOP 2026 代行メモ</title>
<style>
:root {
  --bg:#faf7fb; --card:#fff; --ink:#292433; --muted:#746c79;
  --accent:#7a4fa3; --line:#e6ddec; --soft:#f1e9f7; --danger:#b63f5c;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;z-index:20;background:rgba(250,247,251,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}
h1{font-size:18px;margin:0;min-width:0}
.filter-open{
  margin-left:auto;
  min-height:36px;
  padding:7px 11px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:var(--accent);
  font-weight:800;
  white-space:nowrap;
}
.filter-open.active{background:var(--soft);border-color:#c9b4dd}
.filter-open small{margin-left:3px;font-size:10px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.summary div{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center}
.summary small{display:block;font-size:10px;color:var(--muted)}
.summary b{display:block;margin-top:2px;font-size:16px;color:var(--accent)}
.controls{padding:10px 12px;display:grid;gap:8px}
.controls>input,.quick-filters select{
  width:100%;min-height:42px;padding:9px 10px;border:1px solid var(--line);
  border-radius:10px;background:#fff;color:var(--ink);font-size:15px
}
.availability-filters{display:flex;gap:8px}
.availability-chip.soldout-only{flex:0 0 calc(50% - 4px)}
.availability-chip{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  min-height:40px;padding:8px 10px;border:1px solid var(--line);
  border-radius:10px;background:#fff;color:var(--muted);font-size:13px;
  font-weight:800;cursor:pointer
}
.availability-chip input{width:18px;height:18px;margin:0;accent-color:var(--accent)}
.availability-chip:has(input:checked){border-color:#c9b4dd;background:var(--soft);color:var(--accent)}
.quick-filters{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bonus{margin:0 12px 12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}
.bonus h2{font-size:15px;margin:0 0 8px}
.bonusgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.bonus-item{min-width:0}
.bonus-item>span{display:block;min-height:28px;font-size:10px;line-height:1.35;color:var(--muted)}
.bonus-step{display:grid;grid-template-columns:42px minmax(48px,1fr) 42px;gap:6px;align-items:center;margin-top:5px}
.bonus-step button{display:flex;align-items:center;justify-content:center;min-width:42px;height:42px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-size:22px;font-weight:800;line-height:1}
.bonus-step button:disabled{opacity:.35}
.bonus-step input{width:100%;min-width:0;height:42px;padding:7px 2px;border:1px solid var(--line);border-radius:9px;text-align:center;font-size:16px;font-weight:800;color:var(--ink);background:#fff}
.bonus-step input:disabled{background:#f4f1f6;color:var(--accent);opacity:1}
.bonuscheck{margin-top:8px;padding:8px;border-radius:9px;background:var(--soft);font-size:12px}
.bonusextra{margin-top:7px;padding:9px;border-radius:9px;background:#fff4d8;color:#8a5b00;font-size:12px;font-weight:700}

body.filter-opened{overflow:hidden}
.filter-overlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  background:var(--bg);
}
.filter-overlay.open{display:flex;flex-direction:column}
.filter-overlay-head{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 14px 12px;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.filter-overlay-head h2{margin:0;font-size:18px}
.filter-close{
  width:42px;
  height:42px;
  border:0;
  border-radius:50%;
  background:var(--soft);
  color:var(--ink);
  font-size:24px;
  line-height:1;
}
.filter-scroll{
  flex:1 1 auto;
  overflow:auto;
  padding:14px 14px 110px;
  -webkit-overflow-scrolling:touch;
}
.filter-section{
  margin-bottom:18px;
  padding-bottom:18px;
  border-bottom:1px solid var(--line);
}
.filter-section:last-child{border-bottom:0}
.filter-section h3{margin:0 0 9px;font-size:14px}
.filter-hint{margin:-3px 0 9px;color:var(--muted);font-size:11px}
.check-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.check-grid.characters{grid-template-columns:repeat(3,minmax(0,1fr))}
.check-card{
  display:flex;
  align-items:center;
  gap:8px;
  min-height:42px;
  padding:9px 10px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  font-size:13px;
}
.check-card input{width:20px;height:20px;margin:0;accent-color:var(--accent)}
.filter-select{
  width:100%;
  min-height:44px;
  padding:9px 11px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  font-size:16px;
}
.character-group{
  margin:0 0 9px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  overflow:hidden;
}
.character-group summary{
  display:flex;
  align-items:center;
  min-height:46px;
  padding:10px 12px;
  cursor:pointer;
  list-style:none;
  font-size:14px;
  font-weight:800;
  user-select:none;
}
.character-group summary::-webkit-details-marker{display:none}
.character-group summary::after{
  content:"⌄";
  margin-left:auto;
  color:var(--muted);
  font-size:18px;
  line-height:1;
  transition:transform .18s ease;
}
.character-group[open] summary::after{transform:rotate(180deg)}
.character-group[open] summary{border-bottom:1px solid var(--line)}
.character-group-body{padding:10px}
.character-subtitle{
  margin:12px 0 7px;
  color:var(--accent);
  font-size:11px;
  font-weight:800;
}
.character-subtitle:first-child{margin-top:0}
.check-card small{
  display:block;
  color:var(--muted);
  font-size:10px;
  line-height:1.35;
}

.data-management{
  margin-top:4px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  overflow:hidden;
}
.data-management summary{
  display:flex;
  align-items:center;
  min-height:48px;
  padding:11px 13px;
  cursor:pointer;
  list-style:none;
  font-size:14px;
  font-weight:800;
  user-select:none;
}
.data-management summary::-webkit-details-marker{display:none}
.data-management summary::after{
  content:"⌄";
  margin-left:auto;
  color:var(--muted);
  font-size:18px;
  line-height:1;
  transition:transform .18s ease;
}
.data-management[open] summary::after{transform:rotate(180deg)}
.data-management[open] summary{border-bottom:1px solid var(--line)}
.data-management-body{padding:12px}
.data-management-note{
  margin:0 0 10px;
  color:var(--muted);
  font-size:11px;
  line-height:1.55;
}
.data-reset-buttons{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}
.data-reset-buttons button{
  min-height:44px;
  padding:10px 12px;
  border:1px solid #e3b9b4;
  border-radius:10px;
  background:#fff;
  color:#b9493d;
  font-size:13px;
  font-weight:800;
  text-align:left;
}
.data-reset-buttons button:active{
  background:#fff1ef;
  transform:translateY(1px);
}

.filter-actions{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:8px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.97);
  border-top:1px solid var(--line);
}
.filter-actions button{
  min-height:46px;
  border-radius:11px;
  font-weight:800;
  font-size:14px;
}
.filter-reset{border:1px solid var(--line);background:#fff;color:var(--muted)}
.filter-apply{border:0;background:var(--accent);color:#fff}

.list{display:grid;gap:8px;padding:0 10px 130px}
.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px;display:grid;grid-template-columns:76px 1fr auto;gap:10px;align-items:center}
.item.active{outline:2px solid #c9b4dd;background:#fefcff}
.item.purchased{background:#f3faf7;border-color:#b8d8ca}
.item.purchased .thumb,
.item.purchased .name,
.item.purchased .variant,
.item.purchased .meta,
.item.purchased .price{opacity:.58}
.purchase-check{
  grid-column:1/-1;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:7px;
  border:0;
  background:transparent;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  padding:2px 0 0;
}
.purchase-check::before{
  content:"";
  width:20px;
  height:20px;
  border:2px solid var(--line);
  border-radius:6px;
  background:#fff;
}
.purchase-check.checked{color:#4f7f69}
.purchase-check.checked::before{
  content:"✓";
  display:flex;
  align-items:center;
  justify-content:center;
  border-color:#7fb39a;
  background:#7fb39a;
  color:#fff;
  font-size:14px;
}

.item.soldout{
  background:#f3f3f3;
  border-color:#d3d3d3;
}
.item.soldout .thumb,
.item.soldout .name,
.item.soldout .variant,
.item.soldout .meta,
.item.soldout .price,
.item.soldout .random-badge{
  opacity:.45;
}
.item.soldout .qty button,
.item.soldout .qty input{
  opacity:.45;
  pointer-events:none;
}
.item-actions{
  grid-column:1/-1;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:14px;
}
.soldout-check{
  display:flex;
  align-items:center;
  gap:7px;
  border:0;
  background:transparent;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  padding:2px 0 0;
}
.soldout-check::before{
  content:"";
  width:20px;
  height:20px;
  border:2px solid var(--line);
  border-radius:6px;
  background:#fff;
}
.soldout-check.checked{
  color:var(--danger);
}
.soldout-check.checked::before{
  content:"×";
  display:flex;
  align-items:center;
  justify-content:center;
  border-color:var(--danger);
  background:var(--danger);
  color:#fff;
  font-size:15px;
}
.thumb{width:76px;height:76px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#fff}
.thumb img{width:100%;height:100%;object-fit:contain}
.name{font-size:13px;font-weight:700;line-height:1.4}
.variant{font-size:11px;color:var(--accent);margin-top:3px}
.meta{font-size:10px;color:var(--muted);margin-top:3px}
.price{font-size:12px;font-weight:700;margin-top:3px}
.random-badge{display:inline-block;margin-top:5px;padding:3px 7px;border-radius:999px;background:#fff3d9;color:#8a5b00;font-size:10px;font-weight:700;border:1px solid #f0d493}
.qty{display:grid;grid-template-columns:34px 58px 34px;gap:5px;align-items:center}
.qty button{border:0;border-radius:8px;padding:8px 0;background:var(--accent);color:#fff;font-size:19px;font-weight:700}
.qty input{width:58px;padding:8px 4px;border:1px solid var(--line);border-radius:8px;text-align:center;font-size:18px;font-weight:800;color:var(--ink)}
footer{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding:9px 12px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:30}
footer button{flex:1;border:0;border-radius:10px;padding:10px;background:var(--accent);color:#fff;font-weight:700}
footer button.secondary{background:#fff;color:var(--accent);border:1px solid var(--line)}
@media(max-width:560px){
  input,select,textarea{font-size:16px}
  .bonusgrid{grid-template-columns:1fr}
  .bonus-item{display:grid;grid-template-columns:minmax(0,1fr) 150px;gap:8px;align-items:center}
  .bonus-item>span{min-height:0;font-size:11px}
  .bonus-step{margin-top:0}
  .check-grid.characters{grid-template-columns:repeat(2,minmax(0,1fr))}
  .item{grid-template-columns:64px 1fr}
  .thumb{width:64px;height:64px}
  .qty{grid-column:2;justify-self:end}
}

.purchaserbar{padding:10px 12px 2px}
.purchaserbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.purchaserbar-head b{font-size:13px}
.purchaserbar-head small{color:var(--muted);font-size:10px}
.purchaser-tabs{display:flex;gap:7px;overflow-x:auto;padding:2px 1px 10px;scrollbar-width:none}
.purchaser-tabs::-webkit-scrollbar{display:none}
.purchaser-tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:9px 14px;font-weight:700}
.purchaser-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.purchaser-tab.add{border-style:dashed;color:var(--accent)}
.viewnote{margin:0 12px 10px;padding:8px 10px;border-radius:10px;background:var(--soft);font-size:11px;color:var(--muted)}
dialog{width:min(92vw,390px);border:0;border-radius:18px;padding:0;box-shadow:0 24px 70px rgba(31,24,38,.25)}
dialog::backdrop{background:rgba(30,24,36,.38)}
.dialogbox{padding:18px}
.dialogbox h2{font-size:17px;margin:0 0 14px}
.dialogbox label{display:block;font-size:12px;color:var(--muted);margin-bottom:12px}
.dialogbox input{width:100%;margin-top:5px;padding:11px;border:1px solid var(--line);border-radius:10px}
.dialogactions{display:flex;gap:8px;justify-content:flex-end}
.dialogactions button{border:0;border-radius:10px;padding:10px 14px;font-weight:700}
.dialogactions .cancel{background:#f0edf2;color:var(--ink)}
.dialogactions .save{background:var(--accent);color:#fff}
.manage-link{border:0;background:transparent;color:var(--accent);font-weight:700;padding:4px}
.manage-row{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.manage-row:last-child{border-bottom:0}
.manage-row button{border:0;border-radius:8px;padding:7px 9px}
.manage-row .rename{background:var(--soft);color:var(--accent)}
.manage-row .delete{background:#fff0f3;color:var(--danger)}
.qty.aggregate input{background:#f4f1f6;color:var(--accent);font-weight:700}
.qty.aggregate button{visibility:hidden}


.share-dialog{width:min(94vw,520px);max-height:92vh}
.share-preview-wrap{background:#f4f0f6;border:1px solid var(--line);border-radius:14px;padding:10px;max-height:60vh;overflow:auto;text-align:center}
.share-preview-wrap img{display:block;width:100%;height:auto;border-radius:9px;background:#fff;box-shadow:0 4px 18px rgba(38,28,46,.12)}
.share-help{font-size:11px;line-height:1.6;color:var(--muted);margin:10px 0 0}
.share-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.share-actions button,.share-actions a{display:flex;align-items:center;justify-content:center;min-height:44px;border:0;border-radius:10px;padding:10px;font-weight:700;text-decoration:none;font-size:14px}
.share-actions .primary{background:var(--accent);color:#fff}
.share-actions .secondary{background:#fff;color:var(--accent);border:1px solid var(--line)}
.share-actions .close{grid-column:1/-1;background:#f0edf2;color:var(--ink)}
.share-actions [hidden]{display:none!important}
.share-generating{padding:28px 8px;color:var(--muted);font-size:13px}


.to-top{
  position:fixed;
  right:14px;
  bottom:calc(78px + env(safe-area-inset-bottom));
  z-index:29;
  width:48px;
  height:48px;
  border:0;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  font-size:22px;
  font-weight:800;
  box-shadow:0 5px 18px rgba(46,34,58,.22);
  opacity:0;
  visibility:hidden;
  transform:translateY(8px);
  transition:.18s ease;
}
.to-top.show{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}
@media(max-width:560px){
}

@media print{
  header,.controls,.bonus,footer,.filter-overlay{display:none!important}
  body{background:#fff}
  .list{padding:0}
  .item{break-inside:avoid}
  .item:not(.active){display:none}
  .qty button{display:none}
}
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>GRAND SHOP 2026 代行メモ</h1>
    <button type="button" id="openFilters" class="filter-open">🔍 絞り込み<span id="filterCount"></span></button>
  </div>
  <div class="summary">
    <div><small>選択商品</small><b id="count">0点</b></div>
    <div><small>合計金額</small><b id="total">¥0</b></div>
    <div><small>特典枚数</small><b id="bonusTotal">0枚</b></div>
  </div>
</header>


<section class="purchaserbar">
  <div class="purchaserbar-head">
    <div><b>購入者</b> <small>タブごとに数量を管理</small></div>
    <button id="managePurchasers" class="manage-link">編集</button>
  </div>
  <div id="purchaserTabs" class="purchaser-tabs"></div>
</section>
<div id="viewNote" class="viewnote"></div>

<section class="controls">
  <input id="search" placeholder="商品名・キャラクター名を検索">

  <div class="availability-filters" aria-label="販売状況">
    <label class="availability-chip soldout-only">
      <input type="checkbox" id="showSoldOut" autocomplete="off">
      <span>売切れ</span>
    </label>
  </div>

  <div class="quick-filters">
    <select id="category" aria-label="商品カテゴリで絞り込み" autocomplete="off">
      <option value="">商品カテゴリ</option>
    </select>

    <select id="selected" aria-label="選択状態で絞り込み" autocomplete="off">
      <option value="">選択状態</option>
      <option value="selected">数量入力済み</option>
      <option value="unselected">数量未入力</option>
    </select>

    <select id="purchaseStatus" aria-label="購入状況で絞り込み" autocomplete="off">
      <option value="">購入・販売状況</option>
      <option value="unpurchased">未購入</option>
      <option value="purchased">購入済み</option>
    </select>

        <select id="resetMenu" aria-label="リセット項目を選択" autocomplete="off">
      <option value="">リセット</option>
      <option value="filters">絞り込みをリセット</option>
      <option value="qty">数量をリセット</option>
      <option value="purchased">購入済みをリセット</option>
      <option value="soldout">売切れをリセット</option>
    </select>
  </div>
</section>

<section id="filterOverlay" class="filter-overlay" aria-hidden="true">
  <div class="filter-overlay-head">
    <h2>絞り込み</h2>
    <button type="button" id="closeFilters" class="filter-close" aria-label="絞り込みを閉じる">×</button>
  </div>

  <div class="filter-scroll">
    <section class="filter-section">
      <h3>発売月</h3>
      <p class="filter-hint">複数選択できます。未選択ならすべて表示します。</p>
      <div id="monthChecks" class="check-grid"></div>
    </section>

    <section class="filter-section">
      <h3>所属</h3>
      <select id="unit" class="filter-select">
        <option value="">全所属</option>
      </select>
    </section>

    <section class="filter-section">
      <h3>キャラクター・種類</h3>
      <p class="filter-hint">複数の推しをまとめて選べます。</p>
      <div id="characterChecks"></div>
    </section>
  </div>

  <div class="filter-actions" style="grid-template-columns:1fr">
    <button type="button" id="applyFilters" class="filter-apply">この条件で表示</button>
<button type="button" id="resetFilters" hidden aria-hidden="true" tabindex="-1"></button>

  </div>
</section>

<section class="bonus">
  <h2>特典の希望内訳</h2>
  <div class="bonusgrid">
    <div class="bonus-item">
      <span>YUKATA-MODE Ver.</span>
      <div class="bonus-step">
        <button type="button" aria-label="YUKATAを1枚減らす" onclick="changeBonus('yukata',-1)">−</button>
        <input id="yukata" type="number" inputmode="numeric" min="0" value="0" aria-label="YUKATAの枚数">
        <button type="button" aria-label="YUKATAを1枚増やす" onclick="changeBonus('yukata',1)">＋</button>
      </div>
    </div>
    <div class="bonus-item">
      <span>Mystical／シャイニング</span>
      <div class="bonus-step">
        <button type="button" aria-label="シャイニングを1枚減らす" onclick="changeBonus('shining',-1)">−</button>
        <input id="mysticalShining" type="number" inputmode="numeric" min="0" value="0" aria-label="シャイニングの枚数">
        <button type="button" aria-label="シャイニングを1枚増やす" onclick="changeBonus('shining',1)">＋</button>
      </div>
    </div>
    <div class="bonus-item">
      <span>Mystical／レイジング</span>
      <div class="bonus-step">
        <button type="button" aria-label="レイジングを1枚減らす" onclick="changeBonus('raging',-1)">−</button>
        <input id="mysticalRaging" type="number" inputmode="numeric" min="0" value="0" aria-label="レイジングの枚数">
        <button type="button" aria-label="レイジングを1枚増やす" onclick="changeBonus('raging',1)">＋</button>
      </div>
    </div>
  </div>
  <div id="bonusCheck" class="bonuscheck">特典0枚／振り分け0枚</div>
  <div id="bonusExtra" class="bonusextra" hidden></div>
</section>


<main id="list" class="list"></main>

<button type="button" id="toTop" class="to-top" aria-label="ページトップへ戻る">↑</button>

<footer>
  <button class="secondary" id="copy">代行メモをコピー</button>
  <button id="shareImage">共有画像を作る</button>
</footer>


<dialog id="purchaserDialog">
  <form method="dialog" class="dialogbox" id="purchaserForm">
    <h2>購入者を追加</h2>
    <label>名前
      <input id="purchaserName" maxlength="20" placeholder="例：わたし、友だちA" required>
    </label>
    <div class="dialogactions">
      <button type="button" class="cancel" id="cancelPurchaser">キャンセル</button>
      <button class="save" id="savePurchaser" value="default">追加</button>
    </div>
  </form>
</dialog>

<dialog id="manageDialog">
  <div class="dialogbox">
    <h2>購入者を編集</h2>
    <div id="manageList"></div>
    <div class="dialogactions" style="margin-top:14px">
      <button class="cancel" id="closeManage">閉じる</button>
    </div>
  </div>
</dialog>


<dialog id="shareDialog" class="share-dialog">
  <div class="dialogbox">
    <h2>共有画像プレビュー</h2>
    <div id="sharePreviewWrap" class="share-preview-wrap">
      <div class="share-generating">画像を作成しています…</div>
    </div>
    <p id="shareHelp" class="share-help">iPhoneでは「共有する」が使えない場合、画像を長押しして写真に保存できます。</p>
    <div class="share-actions">
      <button type="button" id="shareNative" class="primary">共有する</button>
      <a id="downloadImage" class="secondary" download="grandshop-2026.png">画像を保存</a>
      <button type="button" id="closeShare" class="close">閉じる</button>
    </div>
  </div>
</dialog>

<script src="master.js?v=20260723-2020"></script>
<script src="products.js?v=20260723-2020"></script>
<script src="app.js?v=20260723-2020"></script>
</body>
</html>
